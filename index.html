<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Particle Art Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #2c3468;
            font-family: 'Arial', sans-serif;
        }

        canvas {
            display: block;
            cursor: crosshair;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            line-height: 1.6;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .hint {
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        button {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: rgba(100, 150, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(100, 150, 255, 0.5);
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
        }

        button:hover {
            background: rgba(100, 150, 255, 0.5);
            border-color: rgba(100, 150, 255, 0.8);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <div><strong>Particle Art Generator</strong></div>
        <div style="font-size: 12px; margin-top: 5px;">Move your mouse • Click to create magic</div>
    </div>

    <div id="controls" class="hint">
        Press <strong>Space</strong> to clear • <strong>C</strong> to change colors
    </div>

    <button onclick="clearCanvas()">Clear</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let mouse = { x: canvas.width / 2, y: canvas.height / 2 };
        let isDrawing = false;
        let colorMode = 0;

        const colorSchemes = [
            { hue: 280, saturation: 100 }, // Purple
            { hue: 200, saturation: 100 }, // Cyan
            { hue: 150, saturation: 100 }, // Green
            { hue: 40, saturation: 100 },  // Orange
            { hue: 340, saturation: 100 }  // Pink
        ];

        let currentScheme = colorSchemes[0];

        class Particle {
            constructor(x, y, vx, vy) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.age = 0;
                this.maxAge = Math.random() * 80 + 40;
                this.size = Math.random() * 3 + 1;
                this.hue = currentScheme.hue + (Math.random() - 0.5) * 20;
                this.saturation = currentScheme.saturation;
                this.trail = [];
            }

            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > 8) this.trail.shift();

                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15; // Gravity
                this.vx *= 0.98; // Friction
                this.age++;
            }

            draw() {
                const alpha = 1 - (this.age / this.maxAge);
                
                // Draw trail
                for (let i = 0; i < this.trail.length; i++) {
                    const trailAlpha = (i / this.trail.length) * alpha * 0.5;
                    ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, 60%, ${trailAlpha})`;
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }

                // Draw particle
                ctx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, 70%, ${alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }

            isDead() {
                return this.age >= this.maxAge;
            }
        }

        function createParticles(x, y, count = 8) {
            for (let i = 0; i < count; i++) {
                const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.5;
                const speed = Math.random() * 4 + 2;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed - 2;
                particles.push(new Particle(x, y, vx, vy));
            }
        }

        function createBurst(x, y) {
            for (let i = 0; i < 40; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 6 + 3;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                particles.push(new Particle(x, y, vx, vy));
            }
        }

        function animate() {
            // Fade background for trail effect
            ctx.fillStyle = 'rgba(10, 14, 39, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update and draw particles
            particles = particles.filter(p => !p.isDead());
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            // Continuous particles near mouse
            if (Math.random() < 0.6) {
                createParticles(
                    mouse.x + (Math.random() - 0.5) * 30,
                    mouse.y + (Math.random() - 0.5) * 30,
                    3
                );
            }

            requestAnimationFrame(animate);
        }

        // Event listeners
        document.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        document.addEventListener('click', (e) => {
            createBurst(e.clientX, e.clientY);
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                particles = [];
                ctx.fillStyle = canvas.style.background;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            if (e.key.toLowerCase() === 'c') {
                colorMode = (colorMode + 1) % colorSchemes.length;
                currentScheme = colorSchemes[colorMode];
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        function clearCanvas() {
            particles = [];
            ctx.fillStyle = '#0a0e27';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Start animation
        animate();
    </script>
</body>
</html>
